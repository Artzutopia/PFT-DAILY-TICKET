name: Daily PFT Ticket Update

# Runs every day at 4:45 AM UTC = 10:15 AM IST
on:
  schedule:
    - cron: '45 4 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  update-tickets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Run daily agent
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python run_daily_agent.py

      - name: Commit and push updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ticket_history.db
          git add internet_issues_tickets_*.xlsx 2>/dev/null || true
          git add pending_report_*.xlsx 2>/dev/null || true
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "Auto-update: Daily ticket data $(date -u +%Y-%m-%d)"
          git push
